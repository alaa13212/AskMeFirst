name: build

on:
  push:
    branches: [master, phase-3]
  pull_request:
    branches: [master, phase-3]
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # Filter string mirrors tests/AskMeFirst.Picker.Tests/TestCategories.cs (Name + ReleaseVisual).
        # If you rename either constant, update this line.
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal" --filter "Category!=ReleaseVisual"

  publish:
    name: publish (${{ matrix.os }} / ${{ matrix.rid }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install aarch64 cross-toolchain + qemu
        if: matrix.os == 'ubuntu-latest' && matrix.rid == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-user-static
          # The AOT post-link step (objcopy --only-keep-debug) calls objcopy
          # unqualified; the host's stock /usr/bin/objcopy is x86-only and
          # rejects the aarch64 ELF. Prepend the cross bin dir to PATH so
          # objcopy resolves to the aarch64 build of binutils.
          echo "/usr/aarch64-linux-gnu/bin" >> "$GITHUB_PATH"
          # Register binfmt so the kernel dispatches aarch64 ELF to qemu-user-static.
          # Without this the smoke + cold-start tests fail with "Exec format error".
          sudo update-binfmts --display qemu-aarch64 || true

      - name: Publish (Native AOT)
        run: dotnet publish src/AskMeFirst/AskMeFirst.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishAot=true -o ./publish/${{ matrix.rid }}

      - name: Smoke test --version
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows-latest) ./publish/${{ matrix.rid }}/askmefirst.exe --version ;;
            macos-latest)   ./publish/${{ matrix.rid }}/askmefirst --version ;;
            *)              ./publish/${{ matrix.rid }}/askmefirst --version ;;
          esac

      - name: Cold-start benchmark
        shell: bash
        run: |
          set -e
          case "${{ matrix.os }}" in
            windows-latest)
              BIN=./publish/${{ matrix.rid }}/askmefirst.exe
              ;;
            *)
              BIN=./publish/${{ matrix.rid }}/askmefirst
              ;;
          esac
          # Use bash's `time` builtin + TIMEFORMAT for portable timing across
          # Linux (no /usr/bin/time in some images), macOS (where /usr/bin/time
          # is BSD-style and rejects -f), and Windows bash (msys, no /usr/bin/time).
          TIMEFORMAT='%R'
          for i in 1 2 3; do
            { time "$BIN" --version > /dev/null; } 2>&1 | tail -n 1
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: askmefirst-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/*
          if-no-files-found: error